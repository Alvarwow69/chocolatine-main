name: Chocolatine Integration

on:
  push:
    branches-ignore:
      - "no-ga/**"
  pull_request:
    branches-ignore:
      - "no-ga/**"

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL }}
  EXECUTABLES: "mysh,mosh"
  
jobs:
  check_compilation_and_coding_style:
    runs-on: ubuntu-latest
    if: ${{ !contains(vars.MIRROR_SSH_URL, github.repository) }}
    container: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Check coding style
        run: banana-check-repo

      - name: Check compilation
        run: make 2>&1 | tee output.txt
        timeout-minutes: 2
        env:
          CC: epiclang

      - name: List coding style errors
        run: |
          grep "\[Banana\]" output.txt | while read line
          do
            file=$(echo "$line" | cut -d: -f1)
            row=$(echo "$line" | cut -d: -f2)
            column=$(echo "$line" | cut -d: -f3)
            mess=$(echo "$line" | cut -d: -f5-)
            echo "::error file=$file,line=$row,col=$column::$mess"
          done

      - name: Job fail
        run: |
          if grep -q "\[Banana\]" output.txt; then
            exit 1
          fi

      - name: Clean
        run: make clean

      - name: Check Executables environment variable
        run: |
          IFS=','
          for executable in $EXECUTABLES
          do
          if [ ! -f "$executable" ] || [ ! -x "$executable" ]; then
          echo "::error::$executable is not executable or missing"
          exit 1
          fi
          done

  run_tests:
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    if: ${{ !contains(vars.MIRROR_REPO, github.repository) }}
    container: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run tests
        run: make tests_run
        timeout-minutes: 2

  push_to_mirror:
    runs-on: ubuntu-latest
    needs: run_tests
    if: ${{ !contains(vars.MIRROR_REPO, github.repository) && github.event_name == 'push'}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Mirror to epitech repo
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
